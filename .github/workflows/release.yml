name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build APK & AAB → GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: Set up Flutter 3.38.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Code generation (Drift + Freezed)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        # Uses debug signing until KEYSTORE_BASE64, KEY_ALIAS, KEY_PASSWORD
        # secrets are added — then switch this to --release and add the
        # signing step below.
        run: flutter build apk --debug

      - name: Build AAB
        run: flutter build appbundle --debug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/bundle/debug/app-debug.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

