name: contextual_phone_silence
description: Calendar-aware automatic phone silencing for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Dependency Injection ──────────────────────────────────────────────────
  get_it: ^7.7.0

  # ── State Management ──────────────────────────────────────────────────────
  provider: ^6.1.2

  # ── Navigation ───────────────────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Local Database ────────────────────────────────────────────────────────
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # ── Preferences ──────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Permissions ──────────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Background & Notifications ───────────────────────────────────────────
  flutter_local_notifications: ^17.2.2
  flutter_foreground_task: ^8.7.0
  workmanager: ^0.5.2

  # ── Contacts ─────────────────────────────────────────────────────────────
  flutter_contacts: ^1.1.9+2

  # ── URL Launching ─────────────────────────────────────────────────────────
  url_launcher: ^6.3.0

  # ── Utilities ────────────────────────────────────────────────────────────
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  logger: ^2.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
